<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud de Reintegro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1fa2d6,#2bc0e4);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  width:420px;
  padding:30px;
  border-radius:12px;
  box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.logo{
  text-align:center;
  margin-bottom:15px;
}

.logo img{
  width:140px;
}

h3{
  text-align:center;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#0099cc;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#7fbfd4;
}

.message{
  margin-top:20px;
  text-align:center;
}

.message img{
  width:60px;
  margin-bottom:10px;
}

.case{
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="Personal">
</div>

<h3>Solicitud de Reintegro</h3>

<form id="formulario">

<input type="text" name="dni" placeholder="DNI del titular" required>
<input type="text" name="nombre" placeholder="Nombre del titular" required>
<input type="text" name="cuil" placeholder="CUIL del titular" required>
<input type="text" name="cbu" placeholder="CBU" required>
<input type="tel" name="telefono" placeholder="N° de contacto" required>

<label>Adjunta el comprobante</label>
<input type="file" id="comprobanteFile" accept="image/*,.pdf" required>

<!-- Motivo fijo -->
<input type="hidden" name="motivo" value="Solicitud de reintegro">

<label>Fecha a llamar</label>
<input type="date" name="fecha_llamar" required>

<label>Horario</label>
<select name="horario_llamar" required>
<option value="">Seleccionar</option>
<option>Lo antes posible</option>
<option>A la mañana</option>
<option>A la tarde</option>
<option>A la noche</option>
</select>

<button type="submit">Enviar solicitud</button>

</form>

<div class="message" id="mensaje"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbytxG1w-K50OzNWiJw8xS3jAuIL6or9lyCM9FUEUFECCXkPnmBf7BalGOGxp2GSTFEgaQ/exec";

const form = document.getElementById("formulario");
const mensaje = document.getElementById("mensaje");

function convertirBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });
}

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const file = document.getElementById("comprobanteFile").files[0];
  const base64 = await convertirBase64(file);

  const formData = new FormData(form);
  formData.append("comprobante", base64);

  fetch(scriptURL,{
    method:"POST",
    body:formData
  })
  .then(res=>res.text())
  .then(result=>{
    if(result === "YA_EXISTE"){
      mensaje.innerHTML = `
        <img src="x-roja.png">
        <div>Ya registraste una solicitud en las últimas 24hs.</div>
      `;
    } else {
      mensaje.innerHTML = `
        <img src="tilde-verificacion.png">
        <div class="case">Número de caso: ${result}</div>
        <div>Te contactaremos dentro de 24 a 48hs hábiles.</div>
      `;
    }
    form.style.display="none";
  })
  .catch(()=>{
    mensaje.innerText="Error al enviar el formulario.";
  });

});
</script>

</body>
</html>
