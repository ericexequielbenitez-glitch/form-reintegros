<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Reintegro</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 0;
}

.container {
  width: 90%;
  max-width: 420px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.logo img {
  width: 120px;
  display: block;
  margin: 0 auto 20px;
}

h3 {
  text-align: center;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.message {
  margin-top: 20px;
  text-align: center;
  font-size: 16px;
}

.message img {
  width: 80px;
  display: block;
  margin: 0 auto 10px;
}

.case {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="Logo">
</div>

<h3>Solicitud de Reintegro</h3>

<form id="formulario">

<input type="text" name="nombre" placeholder="Nombre y apellido" required>
<input type="text" name="dni" placeholder="DNI" required>
<input type="text" name="cuil" placeholder="CUIL" required>
<input type="text" name="cbu" placeholder="CBU/CVU" required>
<input type="email" name="correo" placeholder="Correo electrónico" required>

<label>Adjunta el comprobante</label>
<input type="file" id="comprobanteFile" accept="image/*,.pdf" required>

<button type="submit">Enviar solicitud</button>

</form>

<div class="message" id="mensaje"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyZ_mOehySAOWZLxK9-QfvFcCDFe3kM_aWpcD5xrObNdnh_XXatwF3vzMnsntNK44OQeg/exec";

const form = document.getElementById("formulario");
const mensaje = document.getElementById("mensaje");

function convertirBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });
}

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const file = document.getElementById("comprobanteFile").files[0];
  const base64 = await convertirBase64(file);

  const formData = new FormData(form);
  formData.append("comprobante", base64);

  fetch(scriptURL,{
    method:"POST",
    body:formData
  })
  .then(res=>res.text())
  .then(result=>{
    if(result === "YA_EXISTE"){
      mensaje.innerHTML = `
        <img src="x-roja.png">
        <div>Ya registraste una solicitud en las últimas 24hs.</div>
      `;
    } else {
      mensaje.innerHTML = `
        <img src="tilde-verificacion.png">
        <div class="case">Número de caso: ${result}</div>
        <div>Te contactaremos dentro de 24 a 48hs hábiles.</div>
      `;
    }
    form.style.display="none";
  })
  .catch(()=>{
    mensaje.innerText="Error al enviar el formulario.";
  });

});
</script>

</body>
</html>
